name: Deploy Godot Web build to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  GODOT_VERSION: 4.7-stable
  GODOT_TEMPLATE_VERSION: 4.7.stable
  GODOT_BINARY: Godot_v4.7-stable_linux.x86_64

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out project
        uses: actions/checkout@v6

      - name: Install Godot and Web export templates
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/godot" "$RUNNER_TEMP/templates"
          curl --fail --location --retry 3 \
            --output "$RUNNER_TEMP/godot.zip" \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/${GODOT_BINARY}.zip"
          unzip -q "$RUNNER_TEMP/godot.zip" -d "$RUNNER_TEMP/godot"
          chmod +x "$RUNNER_TEMP/godot/${GODOT_BINARY}"

          curl --fail --location --retry 3 \
            --output "$RUNNER_TEMP/export_templates.tpz" \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          unzip -q "$RUNNER_TEMP/export_templates.tpz" -d "$RUNNER_TEMP/templates"
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}"
          cp -R "$RUNNER_TEMP/templates/templates/." \
            "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}/"

      - name: Import project and export Web build
        shell: bash
        run: |
          set -euo pipefail
          GODOT="$RUNNER_TEMP/godot/${GODOT_BINARY}"
          "$GODOT" --headless --path "$GITHUB_WORKSPACE" --editor --quit
          mkdir -p "$GITHUB_WORKSPACE/build/web"
          "$GODOT" --headless --path "$GITHUB_WORKSPACE" \
            --export-release "Web" "$GITHUB_WORKSPACE/build/web/index.html"
          test -s "$GITHUB_WORKSPACE/build/web/index.html"
          test -s "$GITHUB_WORKSPACE/build/web/index.pck"
          test -s "$GITHUB_WORKSPACE/build/web/index.wasm"
          touch "$GITHUB_WORKSPACE/build/web/.nojekyll"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
